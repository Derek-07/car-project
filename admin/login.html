<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Apex Performance Car Rental</title>
    <!--==============================
        Favicon - APB Logo
    ============================== -->
    <link rel="icon" type="image/png" href="../assets/img/apc high.png">
    <link rel="apple-touch-icon" href="../assets/img/apc high.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/admin-style-premium.css">
    <style>
        .login-wrapper {
            display: flex;
            height: 100vh;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
        }

        .login-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .login-logo {
            margin-bottom: 40px;
            text-align: center;
        }

        .login-logo img {
            max-width: 200px;
            height: auto;
            margin-bottom: 25px;
        }

        .login-logo-icon {
            background: linear-gradient(135deg, #d4af37 0%, #b8941f 100%);
            padding: 30px 40px;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .login-logo-icon i {
            font-size: 48px;
            color: #000;
        }

        .login-title {
            font-size: 32px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 60px;
        }

        .login-form {
            width: 100%;
            max-width: 420px;
        }

        .login-form .form-group {
            margin-bottom: 24px;
        }

        .login-form label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 14px;
        }

        .login-form .form-icon {
            color: #d4af37;
            font-size: 16px;
        }

        .login-form input {
            width: 100%;
            padding: 12px 16px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .login-form input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .login-form input:focus {
            outline: none;
            border-color: #d4af37;
            background-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 24px 0;
            font-size: 13px;
        }

        .remember-forgot a {
            color: #d4af37;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .remember-forgot a:hover {
            color: #e5c158;
        }

        .remember-forgot label {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
        }

        .remember-forgot input[type="checkbox"] {
            width: auto;
            accent-color: #d4af37;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #d4af37 0%, #b8941f 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
            letter-spacing: 0.3px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-demo {
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.8;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 16px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .login-demo strong {
            color: #d4af37;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .login-form {
                max-width: 100%;
            }

            .login-title {
                font-size: 28px;
            }

            .login-left {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-left">
            <div class="login-logo">
                <div class="login-logo-icon">
                    <i class="fas fa-car"></i>
                </div>
                <h1 class="login-title">CarHub Admin</h1>
                <p class="login-subtitle">Apex Performance Car Rental Management</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope form-icon"></i>
                        Email Address
                    </label>
                    <input type="email" id="email" name="email" placeholder="admin@apexcars.com" required>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock form-icon"></i>
                        Password
                    </label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="remember-forgot">
                    <label>
                        <input type="checkbox" name="remember">
                        Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
                    Sign In to Dashboard
                </button>

                <div class="login-demo">
                    <strong>📋 Demo Credentials:</strong><br>
                    Email: <strong>admin@apexcars.com</strong><br>
                    Password: <strong>admin123</strong>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/admin-script.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.querySelector('input[name="email"]').value;
            const password = document.querySelector('input[name="password"]').value;

            // Simulate login (no backend)
            if (email && password) {
                // Store mock token
                localStorage.setItem('adminToken', 'mock-token-' + Date.now());
                AdminPanel.showAlert('Login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        });
    </script>
</body>
</html>
